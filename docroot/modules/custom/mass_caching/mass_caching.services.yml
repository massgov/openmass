parameters:
  mass_caching.skip_procedural_hook_scan: true

services:
  Drupal\mass_caching\ManualPurger:
    class: Drupal\mass_caching\ManualPurger
    arguments: ['@purge.queuers', '@purge.invalidation.factory', '@purge.queue', '@settings']
  mass_caching.stale_response_subscriber:
    class: Drupal\mass_caching\EventSubscriber\StaleResponseSubscriber
    tags:
      - { name: event_subscriber }
  logger.channel.mass_caching:
    parent: logger.channel_base
    arguments: ['mass_caching']
  mass_caching.purge_header_size_logger_subscriber:
    class: Drupal\mass_caching\EventSubscriber\PurgeHeaderSizeLoggerSubscriber
    arguments: ['@logger.channel.mass_caching', '@entity_type.manager']
    tags:
      - { name: event_subscriber }
  mass_caching.akamai_header_creation_subscriber:
    class: Drupal\mass_caching\EventSubscriber\AkamaiHeaderCreationSubscriber
    arguments: ['@akamai.helper.cachetagformatter', '@logger.channel.mass_caching']
    tags:
      - { name: event_subscriber }
