services:
  mass_redirect_normalizer.resolver:
    class: Drupal\mass_redirect_normalizer\RedirectLinkResolver
    arguments: ['@entity_type.manager', '@path_alias.manager', '@request_stack', '@router.request_context']

  mass_redirect_normalizer.manager:
    class: Drupal\mass_redirect_normalizer\RedirectLinkNormalizationManager
    arguments: ['@mass_redirect_normalizer.resolver', '@datetime.time', '@entity_type.manager', '@database']

  Drupal\mass_redirect_normalizer\RedirectLinkNormalizationManager:
    alias: mass_redirect_normalizer.manager

  mass_redirect_normalizer.eligibility:
    class: Drupal\mass_redirect_normalizer\RedirectLinkNormalizationEligibility
    arguments: ['@entity_type.manager']

  mass_redirect_normalizer.enqueuer:
    class: Drupal\mass_redirect_normalizer\RedirectLinkQueueEnqueuer
    arguments: ['@queue', '@entity_type.manager', '@mass_redirect_normalizer.eligibility']

  Drupal\mass_redirect_normalizer\RedirectLinkQueueEnqueuer:
    alias: mass_redirect_normalizer.enqueuer

  mass_redirect_normalizer.change_log:
    class: Drupal\mass_redirect_normalizer\RedirectLinkChangeLog
    arguments: ['@database', '@logger.channel.default']
