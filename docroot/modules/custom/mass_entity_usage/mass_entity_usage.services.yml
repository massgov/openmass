services:
  mass_entity_usage.route_subscriber:
    class: Drupal\mass_entity_usage\Routing\MassRouteSubscriber
    arguments: ['@entity_type.manager', '@config.factory']
    tags:
      - { name: event_subscriber }
  mass_entity_usage.queue_batch_manager:
    class: Drupal\mass_entity_usage\EntityUsageQueueBatchManager
    arguments: [ '@entity_type.manager', '@string_translation', '@config.factory', '@state' ]
  mass_entity_usage.usage:
    class: Drupal\mass_entity_usage\MassEntityUsage
    arguments: [ '@database', '@event_dispatcher', '@config.factory', '@module_handler' , 'entity_usage']
  mass_entity_usage.linking_pages_warning:
    class: Drupal\mass_entity_usage\Form\LinkingPagesWarning
    arguments: ['@mass_entity_usage.usage', '@string_translation']
  Drupal\mass_entity_usage\Form\LinkingPagesWarning: '@mass_entity_usage.linking_pages_warning'
  Drupal\mass_entity_usage\EntityUsageQueueBatchManager: '@mass_entity_usage.queue_batch_manager'
