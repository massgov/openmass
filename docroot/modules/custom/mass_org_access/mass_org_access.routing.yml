mass_org_access.lookup_user_orgs:
  path: '/mass-org-access/lookup-user-orgs'
  defaults:
    _controller: '\Drupal\mass_org_access\Controller\OrgLookupController::lookup'
    _format: 'json'
  requirements:
    _custom_access: '\Drupal\mass_org_access\Controller\OrgLookupController::access'
  options:
    no_cache: TRUE

mass_org_access.settings:
  path: '/admin/config/content/mass-org-access'
  defaults:
    _form: '\Drupal\mass_org_access\Form\OrgAccessSettingsForm'
    _title: 'Organization access settings'
  requirements:
    _permission: 'administer site configuration'

mass_org_access.mapping_import:
  path: '/admin/config/content/mass-org-access/import'
  defaults:
    _form: '\Drupal\mass_org_access\Form\OrgMappingImportForm'
    _title: 'Import organization mappings'
  requirements:
    _permission: 'administer site configuration'

mass_org_access.mapping_import_template:
  path: '/admin/config/content/mass-org-access/import/template'
  defaults:
    _controller: '\Drupal\mass_org_access\Controller\OrgMappingImportController::template'
  requirements:
    _permission: 'administer site configuration'

mass_org_access.mapping_import_log:
  path: '/admin/config/content/mass-org-access/import/log'
  defaults:
    _controller: '\Drupal\mass_org_access\Controller\OrgMappingImportController::log'
  requirements:
    _permission: 'administer site configuration'
