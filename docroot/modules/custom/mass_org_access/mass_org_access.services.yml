services:
  mass_org_access.org_access_checker:
    class: Drupal\mass_org_access\OrgAccessChecker
    arguments:
      - '@entity_type.manager'

  Drupal\mass_org_access\OrgAccessChecker:
    alias: mass_org_access.org_access_checker

  mass_org_access.hooks:
    class: Drupal\mass_org_access\Hook\MassOrgAccessHooks
    arguments:
      - '@mass_org_access.org_access_checker'
    tags:
      - { name: drupal.hook }
