services:
  mass_org_access.settings:
    class: Drupal\mass_org_access\OrgAccessSettings
    arguments:
      - '@state'

  Drupal\mass_org_access\OrgAccessSettings:
    alias: mass_org_access.settings

  mass_org_access.org_access_checker:
    class: Drupal\mass_org_access\OrgAccessChecker
    arguments:
      - '@entity_type.manager'

  Drupal\mass_org_access\OrgAccessChecker:
    alias: mass_org_access.org_access_checker

  mass_org_access.backfill_runner:
    class: Drupal\mass_org_access\BackfillRunner
    arguments:
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@mass_org_access.org_access_checker'
      - '@state'
      - '@file_system'

  Drupal\mass_org_access\BackfillRunner:
    alias: mass_org_access.backfill_runner

  mass_org_access.hooks:
    class: Drupal\mass_org_access\Hook\MassOrgAccessHooks
    arguments:
      - '@mass_org_access.org_access_checker'
      - '@messenger'
      - '@mass_org_access.settings'
      - '@current_user'
    tags:
      - { name: drupal.hook }

  mass_org_access.route_subscriber:
    class: Drupal\mass_org_access\Routing\RouteSubscriber
    tags:
      - { name: event_subscriber }
