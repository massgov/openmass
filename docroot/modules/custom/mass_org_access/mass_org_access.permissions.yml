bypass org access:
  title: 'Bypass organization-based access restrictions'
  description: 'Allows editing content outside the user''s assigned organization. Grant to trusted roles such as Content Administrator.'
  restrict access: true

view permission groups field:
  title: 'View the Permission Groups field on content and documents'
  description: 'Shows the (otherwise hidden) Permission Groups field on every bundle except Organization pages, where it is always shown. Intended for administrators only; not granted to Content Administrators.'
  restrict access: true
