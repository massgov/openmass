help_content: "<h2>Creating Accessible PDFs</h2>\r\n\r\n<p>Accessible PDFs ensure that everyone, including people who use screen readers, magnification software, or other assistive technologies, can read and navigate your content. When PDFs lack proper structure, tags, or alternative text, they can be completely unusable for people with disabilities. Making PDFs accessible is not only a best practice — it's often a legal requirement under laws like the ADA and Section 508.</p>\r\n\r\n<h2>Before Starting</h2>\r\n<ul>\r\n  <li>Make sure the source document is accessible and that you've generated the PDF using \"Save As\" rather than \"Print to PDF.\"</li>\r\n  <li><strong>Source document tools with accessibility features:</strong>\r\n    <ul>\r\n      <li><strong>Microsoft Word/PowerPoint</strong> — use the built-in Accessibility Checker before exporting</li>\r\n      <li><strong>LibreOffice Writer/Impress</strong> — includes an Accessibility Check tool and can export directly to PDF/UA format</li>\r\n      <li><strong>Google Docs/Slides</strong> — now exports tagged PDFs (as of late 2024)</li>\r\n    </ul>\r\n  </li>\r\n  <li>PDFs must be checked for accessibility, even if the source document is accessible.</li>\r\n  <li><strong>Tools for checking and fixing PDFs:</strong>\r\n    <ul>\r\n      <li><strong>Adobe Acrobat Pro</strong> — full-featured PDF remediation (requires license)</li>\r\n      <li><strong><a href=\"https://pac.pdf-accessibility.org/\">PAC (PDF Accessibility Checker)</a></strong> — free PDF/UA validation tool (Windows)</li>\r\n      <li><strong><a href=\"https://pave-pdf.org/\">PAVE</a></strong> — free web-based tool for checking and fixing PDFs</li>\r\n      <li><strong><a href=\"https://verapdf.org/\">veraPDF</a></strong> — open source PDF/UA validator (cross-platform)</li>\r\n    </ul>\r\n  </li>\r\n  <li>A web page is always more accessible than a document. Before creating a document for the website, consider whether the information could go on a web page instead.</li>\r\n  <li><strong>Using Canva?</strong> Canva provides basic PDF accessibility features like automatic reading order, heading structure, and image alt text, but exported PDFs often still need manual fixes to fully meet accessibility standards.</li>\r\n</ul>\r\n\r\n<h2>Making an Accessible PDF with Acrobat Pro</h2>\r\n\r\n<h3>Step 1: Verify That the PDF Contains Selectable Text</h3>\r\n<p>Scanned pages and images of text aren't accessible. To check if text in a PDF is actually an image, try selecting a word. If you can't highlight individual words or letters, or if the entire page highlights as one block, the text is an image.</p>\r\n<p>If you can highlight words, proceed to step 2.</p>\r\n<p>If you can't highlight words, you'll need to convert the image-based text to selectable text using OCR (Optical Character Recognition). In Adobe Acrobat Pro:</p>\r\n<ol>\r\n  <li>Go to <strong>View &gt; Tools &gt; Scan &amp; OCR &gt; Open</strong>.</li>\r\n  <li>Click <strong>Recognize Text</strong>, and then <strong>In This File</strong>.</li>\r\n  <li>Select the page range and language for text recognition.</li>\r\n  <li>Click <strong>Settings</strong>.</li>\r\n  <li>Set the Output to \"Editable Text and Images,\" and click <strong>OK</strong>.</li>\r\n  <li>Click <strong>Recognize Text</strong>.</li>\r\n  <li>Review the PDF for accuracy and completeness. Correct any errors using the \"Edit PDF\" tool.</li>\r\n</ol>\r\n\r\n<h3>Step 2: Verify That the PDF Is Tagged with a Logical Heading Structure</h3>\r\n<p>Three related pieces of structure work together to make a PDF navigable for assistive technologies:</p>\r\n<ul>\r\n  <li><strong>Tags</strong> are invisible labels applied to headings, paragraphs, lists, images, and other content. They tell screen readers and search engines what each piece of content <em>is</em>.</li>\r\n  <li><strong>The structure tree</strong> is the hierarchical organization of those tags. It tells screen readers what order to read content in and how it nests (for example, that a list item belongs to a list that belongs to a section). Without a structure tree, a PDF can be marked as tagged yet still be effectively unusable for assistive technologies.</li>\r\n  <li><strong>Heading hierarchy</strong> within the structure tree must start at H1 and must not skip levels. Screen reader users navigate documents by jumping between headings; a document that has no headings at all, starts at H2, or jumps from H1 to H3 is confusing and harder to navigate.</li>\r\n</ul>\r\n<p>PDF/UA and the Matterhorn Protocol (the international PDF accessibility standards) require all three to be present and correct.</p>\r\n<p>If the PDF was created using \"Print to PDF,\" scanned as a flat image, or generated from a source document lacking structure, it may be missing tags or the structure tree. If the source document used heading styles inconsistently (skipping from Heading 1 to Heading 3, or starting at Heading 2), the PDF will inherit those problems.</p>\r\n<p>To check if the PDF is tagged, go to <strong>File &gt; Properties &gt; Description</strong> tab. Look for <strong>Tagged PDF</strong>.</p>\r\n<p>If Tagged PDF is <strong>Yes</strong>, proceed to step 3.</p>\r\n<p>If Tagged PDF is <strong>No</strong>, you'll need to add tags. In Adobe Acrobat Pro:</p>\r\n<ol>\r\n  <li>Click the <strong>Tools</strong> tab.</li>\r\n  <li>Under <strong>Protect &amp; Standardize</strong>, click the <strong>Accessibility</strong> icon.</li>\r\n  <li>In the right sidebar, click <strong>Autotag Document</strong>. This adds tags and a structure tree based on the document's visual hierarchy.</li>\r\n</ol>\r\n<p>To inspect heading hierarchy after tagging, open the <strong>Tags panel</strong> (View &gt; Show/Hide &gt; Navigation Panes &gt; Tags) and confirm that &lt;H1&gt;, &lt;H2&gt;, etc., appear in sequence. If they don't, fix the source document's heading styles and re-export.</p>\r\n\r\n<h3>Step 3: Verify That the PDF Has a Title</h3>\r\n<p>Add a descriptive title to the document properties to improve accessibility, searchability, and user experience.</p>\r\n<ol>\r\n  <li>Go to <strong>File &gt; Properties &gt; Description</strong> tab.</li>\r\n  <li>Add a <strong>Title</strong>. If a title is already populated, check that it's written in plain language.</li>\r\n  <li>Click the <strong>Initial View</strong> tab.</li>\r\n  <li>Set <strong>Show</strong> to \"Document Title.\"</li>\r\n  <li>Click <strong>OK</strong>.</li>\r\n</ol>\r\n\r\n<h3>Step 4: Verify Language Settings</h3>\r\n<p>If the PDF will only be printed (such as a flyer, poster, or sign), you don't need to set a language. Skip to step 5.</p>\r\n<p>If the PDF will be shared digitally (on the website or via email), you'll need to set a language.</p>\r\n<h4>Set Main Language</h4>\r\n<ol>\r\n  <li>Go to <strong>File &gt; Properties &gt; Advanced</strong> tab.</li>\r\n  <li>Select the main <strong>Language</strong> used or verify the currently selected language is correct.</li>\r\n  <li>Click <strong>OK</strong>.</li>\r\n</ol>\r\n<p>If the document uses only one language, skip to step 5.</p>\r\n<h4>Set Other Languages for Certain Sections</h4>\r\n<ol>\r\n  <li>Go to <strong>View &gt; Show/Hide &gt; Navigation Panes &gt; Accessibility tags</strong>.</li>\r\n  <li>In the left sidebar (Accessibility tags), click each tag in the list until you find one that highlights a section of text written in a different language.</li>\r\n  <li>Right-click the tag that contains text in a different language, and select <strong>Properties</strong>.</li>\r\n  <li>Select the <strong>Language</strong> used in that section of text, and click <strong>Close</strong>.</li>\r\n  <li>Repeat steps 2-4 for each section of text that's written in a different language than the primary language.</li>\r\n</ol>\r\n\r\n<h3>Step 5: Verify That Form Fields Are Accessible</h3>\r\n<p>If the PDF doesn't have form fields, skip to step 6.</p>\r\n<p>If the PDF has form fields, you'll need to make the form fields accessible by:</p>\r\n<ul>\r\n  <li>Adding descriptive tooltips</li>\r\n  <li>Adding tags for form fields</li>\r\n  <li>Checking form field tab order</li>\r\n</ul>\r\n<p><strong>Consider using a web form instead of a PDF.</strong> While the process takes some time, web forms are much more accessible than PDFs.</p>\r\n\r\n<h3>Step 6: Run an Accessibility Check</h3>\r\n<p>Use a PDF accessibility checker to identify and fix remaining issues.</p>\r\n<p><strong>In Adobe Acrobat Pro:</strong></p>\r\n<ol>\r\n  <li>Click the <strong>Tools</strong> tab.</li>\r\n  <li>Under <strong>Protect &amp; Standardize</strong>, click the <strong>Accessibility</strong> icon.</li>\r\n  <li>In the right sidebar, click <strong>Accessibility Check</strong>.</li>\r\n  <li>Click <strong>Start Checking</strong>.</li>\r\n  <li>In the left sidebar (Accessibility Checker), click the arrow icon to the left of any category where an issue is reported.\r\n    <ul>\r\n      <li>Right-click an issue to see how to fix it.</li>\r\n      <li>Issues with a \"Fix\" option are simple problems that Acrobat can correct automatically, such as adding a document title or setting the language.</li>\r\n      <li>Issues without a \"Fix\" option require human judgment, such as determining correct reading order or verifying color contrast. Select \"Explain\" for information on how to resolve these issues.</li>\r\n      <li>Resolve all issues marked as <strong>Failed</strong>.</li>\r\n      <li>Review all issues marked as <strong>Needs manual check</strong>. If an item passes manual inspection, select \"Pass.\"</li>\r\n    </ul>\r\n  </li>\r\n</ol>\r\n<p><strong>Without Acrobat Pro:</strong> Use <a href=\"https://pac.pdf-accessibility.org/\">PAC</a> (Windows) or <a href=\"https://pave-pdf.org/\">PAVE</a> (web-based) to check your PDF for accessibility issues. These free tools can identify problems, though some fixes may still require Acrobat Pro or similar software.</p>\r\n\r\n<h3>Step 7: Save Your Work and Upload</h3>\r\n<p>Don't forget to save! When finished, go to <strong>File &gt; Save</strong>.</p>\r\n<p>If you've completed the steps above, your PDF should pass the PDFa11y accessibility checks when you upload it. If any issues are still flagged, revisit the relevant step to resolve them.</p>\r\n"
