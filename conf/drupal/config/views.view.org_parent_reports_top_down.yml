          plugin_id: text
          empty: true
          content:
            value: "<p>This report shows all published organizations and the organizations linked in the \"Organization Parent\" field, all the way up to the 5th level parent organization. If there are no parent organization listed, that means that the organization is a top level organization. </p><p>This parent organization structure is not used in breadcrumbs (which use the \"Parent\" field) and is not directly visible to the public, but it is used in the following ways:\r\n<ul>\r\n<li>When visitors limit searches to a specific organization, their searches include content from all descendant organizations</li>\r\n<li>The Organization Analytics report linked from the <a href=\"/admin/home\">author welcome page</a>) uses this hierarchy and includes data for descendant organizations</li>\r\n<li>Within edit.mass.gov, authors can use a filter on <a href=\"/admin/advsearch/page\">Advanced Search for pages</a>, <a href=\"/admin/ma-dash/documents-advanced-search\">Advanced Search for documents</a>, and some <a href=\"/admin/ma-dash/reports\">other reports</a> to include content from an organization <strong>and</strong> all descendant organizations. </li></p>\r\n"
