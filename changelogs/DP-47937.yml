Changed:
  - description: Mosaic featured item images are now decorative. Authors no longer see an alt text input for mosaic images, help text explains the images must not carry content beyond the link text, and mosaic images always render with an empty alt attribute.
    issue: DP-47937
Added:
  - description: Added the ma:mosaic-alt-report drush command that lists mosaic images with stored alt text, so authors using images in a non-decorative way can be notified.
    issue: DP-47937
